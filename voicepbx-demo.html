<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VoicePBX — Demo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#F5F7FA;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#F8FAFC}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:10px}
@keyframes pulse2{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,0.25)}50%{box-shadow:0 0 0 7px rgba(34,197,94,0.07)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes ticker{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}
.fade{animation:fadeUp 0.22s ease}
.dot-pulse{animation:pulse2 2s infinite}
.tick{animation:ticker 1s infinite}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,createContext,useContext}=React;
const {AreaChart,Area,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell,Legend}=Recharts;
const Ctx=createContext(null);
const useA=()=>useContext(Ctx);

const STATS={
  totals:{total:247,answered:198,missed:34,busy:15,avg:183,mins:604},
  hours:[{h:8,v:12},{h:9,v:28},{h:10,v:45},{h:11,v:38},{h:12,v:22},{h:13,v:18},{h:14,v:41},{h:15,v:35},{h:16,v:30},{h:17,v:24},{h:18,v:14}],
  agents:[
    {ext:"1001",name:"Олексій Петренко",calls:52,sec:9540,ans:44},
    {ext:"1002",name:"Марія Ковальчук",calls:48,sec:8720,ans:41},
    {ext:"1003",name:"Іван Сидоренко",calls:61,sec:11200,ans:55},
    {ext:"1004",name:"Оксана Мельник",calls:39,sec:7100,ans:33},
    {ext:"1005",name:"Дмитро Бондар",calls:47,sec:8500,ans:40},
  ]
};
const CHANNELS=[
  {id:"1",num:"050 123 45 67",ext:"1001",agent:"Олексій Петренко",dur:183,queue:"support"},
  {id:"2",num:"067 234 56 78",ext:"1002",agent:"Марія Ковальчук",dur:47,queue:"support"},
  {id:"3",num:"044 789 01 23",ext:"1003",agent:"Іван Сидоренко",dur:312,queue:"sales"},
];
const CDR=Array.from({length:30},(_,i)=>{
  const d=["ANSWERED","ANSWERED","ANSWERED","NO ANSWER","BUSY"][i%5];
  const b=d==="ANSWERED"?60+Math.floor(Math.random()*300):0;
  return{id:i+1,date:new Date(Date.now()-i*480000),
    src:["050 123 45 67","067 234 56 78","093 111 22 33","044 123 45 67","099 876 54 32"][i%5],
    dst:["1001","1002","1003","1001","1002"][i%5],
    agent:["Олексій П.","Марія К.","Іван С.","Олексій П.","Марія К."][i%5],
    dur:b+5,bill:b,disp:d,type:i%3===1?"out":"in"};
});
const RECS=Array.from({length:10},(_,i)=>{
  const mins=[3,5,2,7,4,6,2,8,3,5][i];
  return{id:i,src:["050 123 45 67","067 234 56 78","044 123 45 67"][i%3],
    dst:["1001","1002","1003"][i%3],
    agent:["Олексій П.","Марія К.","Іван С."][i%3],
    date:new Date(Date.now()-i*3600000*3),
    size:mins*60*8200,dur:mins*60+Math.floor(Math.random()*55)};
});
const AGENTS=[
  {id:1,ext:"1001",name:"Олексій Петренко",role:"agent",active:1,since:"2024-01-15",today:52,status:"online"},
  {id:2,ext:"1002",name:"Марія Ковальчук",role:"agent",active:1,since:"2024-01-20",today:48,status:"busy"},
  {id:3,ext:"1003",name:"Іван Сидоренко",role:"agent",active:1,since:"2024-02-01",today:61,status:"online"},
  {id:4,ext:"1004",name:"Оксана Мельник",role:"agent",active:0,since:"2024-02-10",today:0,status:"offline"},
  {id:5,ext:"2001",name:"Дмитро Бондар",role:"manager",active:1,since:"2024-01-01",today:12,status:"online"},
  {id:6,ext:"9001",name:"Адміністратор",role:"admin",active:1,since:"2024-01-01",today:0,status:"online"},
];

const ROLES={admin:{l:"Адміністратор",c:"#7C3AED",bg:"#F5F3FF"},manager:{l:"Менеджер",c:"#2563EB",bg:"#EFF6FF"},agent:{l:"Агент",c:"#16A34A",bg:"#F0FDF4"}};
const DISP={"ANSWERED":{l:"Відповіли",c:"#16A34A",bg:"#F0FDF4"},"NO ANSWER":{l:"Пропущено",c:"#DC2626",bg:"#FEF2F2"},"BUSY":{l:"Зайнято",c:"#D97706",bg:"#FFFBEB"}};
const ST={online:{c:"#22C55E",l:"Online"},busy:{c:"#F59E0B",l:"Зайнятий"},offline:{c:"#94A3B8",l:"Offline"}};
const SPY=[{id:"spy",l:"👂 Слухати",d:"Агент не знає",c:"#3B82F6"},{id:"whisper",l:"🗣 Whisper",d:"Чує лише агент",c:"#8B5CF6"},{id:"barge",l:"📢 Barge",d:"Чують усі",c:"#F59E0B"}];
const PALL={spy:"👂 Прослуховування",whisper:"🗣 Суфлювання",barge:"📢 Barge",download:"⬇ Завантаження записів",manage:"👥 Управління агентами",stats:"📊 Статистика",cdr:"📋 Журнал дзвінків"};
const PDEF={admin:Object.keys(PALL),manager:["spy","whisper","barge","download","stats","cdr"],agent:["cdr"]};
const NAV=[{id:"dashboard",ico:"⊞",l:"Dashboard"},{id:"calls",ico:"📞",l:"Активні дзвінки"},{id:"cdr",ico:"📋",l:"Журнал дзвінків"},{id:"recs",ico:"🎙",l:"Записи розмов"},{id:"agents",ico:"👥",l:"Агенти"}];

const fDur=s=>{const m=Math.floor(s/60);return m>0?`${m}хв ${s%60}с`:`${s}с`};
const fTimer=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
const fDate=d=>new Date(d).toLocaleString("uk-UA",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
const fSize=b=>b>1048576?`${(b/1048576).toFixed(1)} MB`:`${(b/1024).toFixed(0)} KB`;

const Tip=({active,payload,label})=>{
  if(!active||!payload?.length)return null;
  return <div style={{background:"#0F172A",borderRadius:8,padding:"8px 12px"}}><div style={{color:"#64748B",fontSize:11,marginBottom:3}}>{label}</div>{payload.map((p,i)=><div key={i} style={{color:"#fff",fontSize:13,fontWeight:700}}>{p.value}</div>)}</div>;
};

const Card=({icon,label,value,sub,color,trend})=>(
  <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #E8ECF0",flex:1,minWidth:130,position:"relative",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
    <div style={{position:"absolute",top:-14,right:-14,width:60,height:60,borderRadius:"50%",background:color+"18"}}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
      <div style={{width:34,height:34,borderRadius:9,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>{icon}</div>
      {trend!=null&&<span style={{fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:20,background:trend>=0?"#DCFCE7":"#FEE2E2",color:trend>=0?"#16A34A":"#DC2626"}}>{trend>=0?"↑":"↓"}{Math.abs(trend)}%</span>}
    </div>
    <div style={{fontSize:24,fontWeight:800,color:"#0F172A",lineHeight:1,marginBottom:3}}>{value}</div>
    <div style={{fontSize:12,fontWeight:600,color:"#64748B"}}>{label}</div>
    {sub&&<div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{sub}</div>}
  </div>
);

function Dashboard(){
  const {totals,hours,agents}=STATS;
  const pie=[{name:"Відповіли",value:totals.answered,color:"#22C55E"},{name:"Пропущені",value:totals.missed,color:"#EF4444"},{name:"Зайнято",value:totals.busy,color:"#F59E0B"}];
  return(
    <div className="fade">
      <div style={{marginBottom:18}}><h1 style={{fontSize:20,fontWeight:800,color:"#0F172A",fontFamily:"DM Serif Display,serif",letterSpacing:"-0.3px"}}>Dashboard</h1><p style={{fontSize:12,color:"#94A3B8",marginTop:2}}>{new Date().toLocaleDateString("uk-UA",{weekday:"long",day:"numeric",month:"long"})}</p></div>
      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <Card icon="📞" label="Всього дзвінків" value={totals.total} color="#2563EB" trend={8} sub="за сьогодні"/>
        <Card icon="✅" label="Відповіли" value={totals.answered} color="#22C55E" trend={3} sub={Math.round(totals.answered/totals.total*100)+"%"}/>
        <Card icon="❌" label="Пропущені" value={totals.missed} color="#EF4444" trend={-5}/>
        <Card icon="⏱" label="Сер. тривалість" value={Math.floor(totals.avg/60)+"хв"} color="#8B5CF6"/>
        <Card icon="🕐" label="Хвилин розмов" value={totals.mins} color="#F59E0B" trend={12}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 270px",gap:12,marginBottom:12}}>
        <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #E8ECF0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:2}}>Дзвінки по годинах</div>
          <div style={{fontSize:11,color:"#94A3B8",marginBottom:12}}>Навантаження протягом дня</div>
          <ResponsiveContainer width="100%" height={170}>
            <AreaChart data={hours} margin={{top:0,right:0,left:-24,bottom:0}}>
              <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#2563EB" stopOpacity={0.15}/><stop offset="95%" stopColor="#2563EB" stopOpacity={0}/></linearGradient></defs>
              <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9"/>
              <XAxis dataKey="h" tickFormatter={h=>h+":00"} tick={{fontSize:10,fill:"#94A3B8"}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fontSize:10,fill:"#94A3B8"}} axisLine={false} tickLine={false}/>
              <Tooltip content={<Tip/>}/>
              <Area type="monotone" dataKey="v" name="Дзвінки" stroke="#2563EB" strokeWidth={2.5} fill="url(#g)" dot={{fill:"#2563EB",r:3,strokeWidth:0}}/>
            </AreaChart>
          </ResponsiveContainer>
        </div>
        <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #E8ECF0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
          <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:2}}>Результати</div>
          <div style={{fontSize:11,color:"#94A3B8",marginBottom:8}}>Статуси дзвінків</div>
          <ResponsiveContainer width="100%" height={170}>
            <PieChart><Pie data={pie} cx="50%" cy="44%" innerRadius={48} outerRadius={68} paddingAngle={3} dataKey="value">{pie.map((e,i)=><Cell key={i} fill={e.color}/>)}</Pie><Legend iconType="circle" iconSize={7} formatter={v=><span style={{fontSize:11,color:"#374151"}}>{v}</span>}/><Tooltip content={<Tip/>}/></PieChart>
          </ResponsiveContainer>
        </div>
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:"16px 18px",border:"1px solid #E8ECF0",boxShadow:"0 1px 4px rgba(0,0,0,0.05)"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:12}}>Топ агентів сьогодні</div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead><tr>{["Агент","Дзвінки","Відповіли","% успіху","Час"].map(h=><th key={h} style={{padding:"6px 10px",textAlign:"left",fontSize:10,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"0.5px",borderBottom:"1px solid #F1F5F9"}}>{h}</th>)}</tr></thead>
          <tbody>{agents.map((a,i)=>{const pct=Math.round(a.ans/a.calls*100);return(
            <tr key={a.ext} onMouseEnter={e=>e.currentTarget.style.background="#F8FAFC"} onMouseLeave={e=>e.currentTarget.style.background="transparent"} style={{borderBottom:"1px solid #F8FAFC",cursor:"default"}}>
              <td style={{padding:"8px 10px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:26,height:26,borderRadius:"50%",background:`hsl(${i*55},65%,88%)`,color:`hsl(${i*55},65%,32%)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800}}>{a.name.slice(0,2)}</div><div><div style={{fontSize:12,fontWeight:700,color:"#0F172A"}}>{a.name}</div><div style={{fontSize:10,color:"#94A3B8"}}>вн.{a.ext}</div></div></div></td>
              <td style={{padding:"8px 10px",fontSize:13,fontWeight:700,color:"#0F172A"}}>{a.calls}</td>
              <td style={{padding:"8px 10px",fontSize:13,fontWeight:700,color:"#22C55E"}}>{a.ans}</td>
              <td style={{padding:"8px 10px"}}><div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:50,height:5,background:"#F1F5F9",borderRadius:3,overflow:"hidden"}}><div style={{width:pct+"%",height:"100%",background:pct>=80?"#22C55E":pct>=60?"#F59E0B":"#EF4444",borderRadius:3}}/></div><span style={{fontSize:11,fontWeight:700,color:"#374151"}}>{pct}%</span></div></td>
              <td style={{padding:"8px 10px",fontSize:11,color:"#64748B"}}>{Math.floor(a.sec/60)}хв</td>
            </tr>);})}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function ActiveCalls(){
  const {user}=useA();
  const [ticks,setTicks]=useState(()=>Object.fromEntries(CHANNELS.map(c=>[c.ext,c.dur])));
  const [modes,setModes]=useState({});
  const [conn,setConn]=useState(null);
  const [notif,setNotif]=useState(null);
  useEffect(()=>{const iv=setInterval(()=>setTicks(t=>Object.fromEntries(Object.entries(t).map(([k,v])=>[k,v+1]))),1000);return()=>clearInterval(iv)},[]);
  const canSpy=user.role==="manager"||user.role==="admin";
  const doSpy=(ext,mode)=>{
    setConn(ext);
    setTimeout(()=>{setConn(null);setNotif({ok:true,msg:`✅ Підключено до агента ${ext} (${mode})`});setTimeout(()=>setNotif(null),3500)},1400);
  };
  return(
    <div className="fade">
      <div style={{marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div><h1 style={{fontSize:20,fontWeight:800,color:"#0F172A",fontFamily:"DM Serif Display,serif"}}>Активні дзвінки</h1><p style={{fontSize:12,color:"#94A3B8",marginTop:2}}>Реалтайм моніторинг та суфлювання</p></div>
        <div style={{display:"flex",alignItems:"center",gap:7,background:"#fff",border:"1px solid #E8ECF0",borderRadius:10,padding:"7px 13px"}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:"#22C55E"}} className="dot-pulse"/>
          <span style={{fontSize:12,fontWeight:700,color:"#374151"}}>{CHANNELS.length} активних</span>
        </div>
      </div>
      {notif&&<div style={{marginBottom:12,padding:"10px 14px",borderRadius:10,background:notif.ok?"#F0FDF4":"#FEF2F2",border:`1px solid ${notif.ok?"#BBF7D0":"#FECACA"}`,color:notif.ok?"#16A34A":"#DC2626",fontSize:13,fontWeight:600}}>{notif.msg}</div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
        {CHANNELS.map(c=>{
          const mode=modes[c.ext]||"spy";const isConn=conn===c.ext;
          return(
            <div key={c.id} style={{background:"#fff",borderRadius:14,border:"1px solid #E8ECF0",boxShadow:"0 2px 8px rgba(0,0,0,0.05)",overflow:"hidden"}}>
              <div style={{background:"linear-gradient(135deg,#EFF6FF,#DBEAFE)",padding:"11px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid #DBEAFE"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#22C55E"}} className="dot-pulse"/>
                  <span style={{fontSize:13,fontWeight:700,color:"#1E40AF"}}>Вн. {c.ext}</span>
                  <span style={{fontSize:11,color:"#64748B"}}>• {c.agent.split(" ")[0]}</span>
                </div>
                <code style={{fontSize:14,fontWeight:800,color:"#0F172A",background:"rgba(255,255,255,0.8)",padding:"2px 8px",borderRadius:6,letterSpacing:"1px"}}>{fTimer(ticks[c.ext]||c.dur)}</code>
              </div>
              <div style={{padding:"13px 14px"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,paddingBottom:12,borderBottom:"1px solid #F8FAFC"}}>
                  <div style={{width:36,height:36,borderRadius:10,background:"#F0F7FF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>📱</div>
                  <div><div style={{fontSize:14,fontWeight:700,color:"#0F172A"}}>{c.num}</div><div style={{fontSize:11,color:"#94A3B8"}}>Черга: {c.queue}</div></div>
                </div>
                {canSpy?(
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:7}}>Режим суфлювання</div>
                    <div style={{display:"flex",gap:5,marginBottom:8}}>
                      {SPY.map(m=><button key={m.id} onClick={()=>setModes(s=>({...s,[c.ext]:m.id}))} title={m.d} style={{flex:1,padding:"5px 3px",border:"1.5px solid",borderColor:mode===m.id?m.c:"#E8ECF0",borderRadius:8,cursor:"pointer",background:mode===m.id?m.c+"18":"#F8FAFC",color:mode===m.id?m.c:"#94A3B8",fontSize:10,fontWeight:700,transition:"all 0.15s"}}>{m.l}</button>)}
                    </div>
                    <div style={{fontSize:10,color:"#94A3B8",marginBottom:9}}>{SPY.find(m=>m.id===mode)?.d}</div>
                    <button onClick={()=>doSpy(c.ext,mode)} disabled={isConn} style={{width:"100%",padding:"8px",border:"none",borderRadius:9,background:isConn?"#93C5FD":"linear-gradient(135deg,#2563EB,#1D4ED8)",color:"#fff",fontSize:12,fontWeight:700,cursor:isConn?"not-allowed":"pointer",boxShadow:isConn?"none":"0 3px 10px rgba(37,99,235,0.3)",transition:"all 0.2s"}}>
                      {isConn?"⏳ Підключення...":"🎧 Підключитись"}
                    </button>
                  </div>
                ):<div style={{background:"#F8FAFC",borderRadius:8,padding:"8px",fontSize:11,color:"#94A3B8",textAlign:"center"}}>🔒 Тільки для менеджерів</div>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:14,background:"#fff",borderRadius:12,padding:"13px 16px",border:"1px solid #E8ECF0"}}>
        <div style={{fontSize:10,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8}}>Довідка по режимах суфлювання</div>
        <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>{SPY.map(m=><div key={m.id} style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:7,height:7,borderRadius:"50%",background:m.c}}/><span style={{fontSize:12,fontWeight:600,color:"#374151"}}>{m.l}</span><span style={{fontSize:11,color:"#94A3B8"}}>— {m.d}</span></div>)}</div>
      </div>
    </div>
  );
}

function CdrPage(){
  const [search,setSrch]=useState("");const [disp,setDisp]=useState("");const [pg,setPg]=useState(0);
  const PER=9;
  const filt=CDR.filter(c=>(search===""||c.src.includes(search)||c.dst.includes(search))&&(disp===""||c.disp===disp));
  const paged=filt.slice(pg*PER,(pg+1)*PER);const tp=Math.ceil(filt.length/PER);
  const pb=d=>({padding:"4px 8px",border:"1px solid #E2E8F0",borderRadius:6,background:d?"#F8FAFC":"#fff",color:d?"#CBD5E1":"#374151",cursor:d?"not-allowed":"pointer",fontSize:12,minWidth:26});
  return(
    <div className="fade">
      <div style={{marginBottom:18}}><h1 style={{fontSize:20,fontWeight:800,color:"#0F172A",fontFamily:"DM Serif Display,serif"}}>Журнал дзвінків</h1><p style={{fontSize:12,color:"#94A3B8",marginTop:2}}>CDR — детальна статистика всіх дзвінків</p></div>
      <div style={{background:"#fff",borderRadius:12,padding:"12px 16px",border:"1px solid #E8ECF0",marginBottom:12,display:"flex",gap:9,flexWrap:"wrap",alignItems:"center",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <input value={search} onChange={e=>{setSrch(e.target.value);setPg(0)}} placeholder="🔍 Номер телефону або вн. номер..."

                </div>
                <div style={{fontSize:11,color:"#94A3B8"}}>{fDate(r.date)} • {fDur(r.dur)} • {fSize(r.size)}</div>
              </div>
              <div onClick={e=>e.stopPropagation()} style={{flexShrink:0}}>
                <button style={{padding:"5px 11px",border:"1px solid #E2E8F0",borderRadius:8,background:"#F8FAFC",cursor:"pointer",fontSize:11,fontWeight:600,color:"#64748B"}}

                  <div style={{height:4,background:"#DBEAFE",borderRadius:2,cursor:"pointer",overflow:"hidden"}}>

  const [time,setTime]=useState(new Date());
  useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);
  const PAGES={dashboard:Dashboard,calls:ActiveCalls,cdr:CdrPage,recs:RecsPage,agents:AgentsPage};
  const Page=PAGES[page]||Dashboard;
  const RL={admin:"Адміністратор",manager:"Менеджер",agent:"Агент"};
  const fmtTime=d=>d.toLocaleString("uk-UA",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit",second:"2-digit"});
  return(
    <Ctx.Provider value={{user}}>
      <div style={{display:"flex",height:"100vh",background:"#F5F7FA",overflow:"hidden"}}>
        {/* SIDEBAR */}
        <aside style={{width:sideOpen?244:62,flexShrink:0,transition:"width 0.28s ease",background:"#fff",borderRight:"1px solid #E8ECF0",display:"flex",flexDirection:"column",boxShadow:"2px 0 8px rgba(0,0,0,0.04)",overflow:"hidden",zIndex:10}}>
          <div style={{padding:sideOpen?"18px 16px 16px":"18px 0 16px",display:"flex",alignItems:"center",gap:9,justifyContent:sideOpen?"flex-start":"center",borderBottom:"1px solid #F0F2F5",flexShrink:0}}>
            <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,#2563EB,#1D4ED8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#fff",flexShrink:0,boxShadow:"0 3px 10px rgba(37,99,235,0.35)"}}>☎</div>
            {sideOpen&&<div><div style={{fontSize:14,fontWeight:800,color:"#0F172A",letterSpacing:"-0.3px",fontFamily:"DM Serif Display,serif"}}>VoicePBX</div><div style={{fontSize:9,color:"#94A3B8",fontWeight:700,letterSpacing:"0.8px"}}>CONTROL CENTER</div></div>}
          </div>
          <nav style={{flex:1,padding:"8px 6px",display:"flex",flexDirection:"column",gap:2,overflowY:"auto"}}>
            {NAV.map(item=>{const active=page===item.id;return(
              <button key={item.id} onClick={()=>setPage(item.id)} title={!sideOpen?item.l:""} style={{display:"flex",alignItems:"center",gap:9,padding:sideOpen?"8px 11px":"8px",justifyContent:sideOpen?"flex-start":"center",border:"none",borderRadius:9,cursor:"pointer",background:active?"linear-gradient(135deg,#EFF6FF,#DBEAFE)":"transparent",color:active?"#2563EB":"#64748B",fontSize:12,fontWeight:active?700:500,transition:"all 0.15s",width:"100%",boxShadow:active?"inset 0 0 0 1.5px #BFDBFE":"none"}}
                onMouseEnter={e=>{if(!active)e.currentTarget.style.background="#F8FAFC"}}
                onMouseLeave={e=>{if(!active)e.currentTarget.style.background="transparent"}}
              >
                <span style={{fontSize:16,flexShrink:0}}>{item.ico}</span>
                {sideOpen&&<span style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.l}</span>}
                {sideOpen&&active&&<div style={{marginLeft:"auto",width:5,height:5,borderRadius:"50%",background:"#2563EB",flexShrink:0}}/>}
              </button>
            );})}
          </nav>
          {sideOpen&&(
            <div style={{padding:"12px 14px",borderTop:"1px solid #F0F2F5",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#DBEAFE,#BFDBFE)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#2563EB",flexShrink:0}}>{user.extension}</div>
                <div style={{overflow:"hidden",flex:1}}><div style={{fontSize:11,fontWeight:700,color:"#0F172A",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{user.name}</div><div style={{fontSize:10,color:"#94A3B8"}}>{RL[user.role]}</div></div>
              </div>
            </div>
          )}
        </aside>
        {/* MAIN */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          {/* TOPBAR */}
          <header style={{height:54,background:"#fff",borderBottom:"1px solid #E8ECF0",display:"flex",alignItems:"center",padding:"0 18px",gap:12,flexShrink:0,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
            <button onClick={()=>setSide(o=>!o)} style={{border:"none",background:"none",cursor:"pointer",padding:"5px 7px",borderRadius:7,color:"#64748B",fontSize:16,display:"flex",alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.background="#F1F5F9"} onMouseLeave={e=>e.currentTarget.style.background="none"}>☰</button>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#22C55E"}} className="dot-pulse"/>
              <span style={{fontSize:11,color:"#64748B",fontWeight:600}}>Система активна</span>
            </div>
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:11,color:"#64748B",fontVariantNumeric:"tabular-nums",background:"#F8FAFC",padding:"4px 9px",borderRadius:7,border:"1px solid #E8ECF0",fontWeight:500}}>{fmtTime(time)}</div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:26,height:26,borderRadius:"50%",background:"linear-gradient(135deg,#2563EB,#1D4ED8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#fff"}}>{user.extension[0]}</div>
                <span style={{fontSize:11,fontWeight:700,color:"#334155"}}>{user.name}</span>
              </div>
              <select value={user.role} onChange={e=>{const r=e.target.value;setUser({role:r,name:r==="admin"?"Адміністратор":r==="manager"?"Менеджер Дмитро":"Олексій Петренко",extension:r==="admin"?"9001":r==="manager"?"2001":"1001"})}} style={{padding:"5px 8px",border:"1px solid #E2E8F0",borderRadius:7,fontSize:11,background:"#F8FAFC",color:"#374151",cursor:"pointer",fontWeight:700}}>
                <option value="admin">👑 Адмін</option>
                <option value="manager">👔 Менеджер</option>
                <option value="agent">🎧 Агент</option>
              </select>
            </div>
          </header>
          {/* PAGE */}
          <main style={{flex:1,overflowY:"auto",padding:"18px 20px"}}>
            <Page key={page}/>
          </main>
        </div>
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
